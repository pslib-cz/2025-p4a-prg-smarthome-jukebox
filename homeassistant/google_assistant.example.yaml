# Example manual Google Assistant setup.
# Copy the block into configuration.yaml or include it from a private google_assistant.yaml.
# The exposed input_button entities behave like scene-style voice triggers.

google_assistant:
  project_id: your-google-home-project-id
  service_account: !include SERVICE_ACCOUNT.json
  report_state: true
  expose_by_default: false
  entity_config:
    input_button.hajukebox_google_play_request:
      name: HAJukeBox Play Music
      aliases:
        - Start jukebox music
        - Play local jukebox
      room: Living Room

    input_button.hajukebox_google_pause_request:
      name: HAJukeBox Pause Music
      aliases:
        - Pause jukebox music
        - Stop jukebox music
      room: Living Room

    input_button.hajukebox_google_next_request:
      name: HAJukeBox Next Track
      aliases:
        - Skip jukebox track
        - Play next jukebox song
      room: Living Room

    input_button.hajukebox_google_previous_request:
      name: HAJukeBox Previous Track
      aliases:
        - Previous jukebox track
        - Replay prior jukebox song
      room: Living Room

    input_button.hajukebox_google_focus_mode_request:
      name: HAJukeBox Focus Mode
      aliases:
        - Switch jukebox to focus mode
        - Set jukebox focus mode
      room: Living Room

    input_button.hajukebox_google_party_mode_request:
      name: HAJukeBox Party Mode
      aliases:
        - Switch jukebox to party mode
        - Set jukebox party mode
      room: Living Room

    input_button.hajukebox_google_eco_mode_request:
      name: HAJukeBox Eco Mode
      aliases:
        - Switch jukebox to eco mode
        - Set jukebox eco mode
      room: Living Room

    input_button.hajukebox_google_idle_mode_request:
      name: HAJukeBox Idle Mode
      aliases:
        - Switch jukebox to idle mode
        - Set jukebox idle mode
      room: Living Room
