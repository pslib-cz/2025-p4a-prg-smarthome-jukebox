hajukebox_play:
  alias: HAJukeBox Play
  mode: queued
  sequence:
    - service: rest_command.hajukebox_media_command
      data:
        payload: '{"type":"play"}'

hajukebox_pause:
  alias: HAJukeBox Pause
  mode: queued
  sequence:
    - service: rest_command.hajukebox_media_command
      data:
        payload: '{"type":"pause"}'

hajukebox_next:
  alias: HAJukeBox Next
  mode: queued
  sequence:
    - service: rest_command.hajukebox_media_command
      data:
        payload: '{"type":"next"}'

hajukebox_previous:
  alias: HAJukeBox Previous
  mode: queued
  sequence:
    - service: rest_command.hajukebox_media_command
      data:
        payload: '{"type":"previous"}'

hajukebox_seek:
  alias: HAJukeBox Seek
  mode: queued
  fields:
    progress_percent:
      name: Progress percent
      required: true
      selector:
        number:
          min: 0
          max: 100
          mode: slider
          unit_of_measurement: "%"
  sequence:
    - service: rest_command.hajukebox_media_command
      data:
        payload: >-
          {"type":"seek","progressPercent":{{ progress_percent | int(0) }}}

hajukebox_set_volume:
  alias: HAJukeBox Set Volume
  mode: queued
  fields:
    volume_percent:
      name: Volume percent
      required: true
      selector:
        number:
          min: 0
          max: 100
          mode: slider
          unit_of_measurement: "%"
  sequence:
    - service: rest_command.hajukebox_media_command
      data:
        payload: >-
          {"type":"set_volume","volumePercent":{{ volume_percent | int(0) }}}

hajukebox_set_mode:
  alias: HAJukeBox Set Mode
  mode: restart
  fields:
    mode:
      name: Mode
      required: true
      selector:
        select:
          options:
            - idle
            - focus
            - party
            - eco
    source:
      name: Source
      required: false
      selector:
        text:
  sequence:
    - variables:
        requested_mode: "{{ mode | default('idle') | string | lower | trim }}"
        requested_source: "{{ source | default('manual') | string | lower | trim }}"
        ha_option: >-
          {% if requested_mode in ['focus', 'focus armed'] %}
            Focus armed
          {% elif requested_mode == 'party' %}
            Party
          {% elif requested_mode == 'eco' %}
            Eco
          {% else %}
            Idle
          {% endif %}
    - service: input_text.set_value
      target:
        entity_id: input_text.hajukebox_mode_change_source_value
      data:
        value: "{{ requested_source }}"
    - service: input_select.select_option
      target:
        entity_id: input_select.hajukebox_mode
      data:
        option: "{{ ha_option | trim }}"
