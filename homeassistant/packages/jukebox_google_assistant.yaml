        data:
          value: "Set mode to party"
      - service: input_text.set_value
        target:
          entity_id: input_text.hajukebox_last_voice_response
        data:
          value: "Switching HAJukeBox to party mode"
      - service: logbook.log
        data:
          name: HAJukeBox Google Assistant
          message: "Requested party mode"
      - service: script.hajukebox_set_mode
        data:
          mode: party
          source: google_assistant

  - id: hajukebox_google_eco_mode_request
    alias: HAJukeBox Google Assistant Eco Mode Request
    mode: queued
    trigger:
      - platform: state
        entity_id: input_button.hajukebox_google_eco_mode_request
    action:
      - service: input_text.set_value
        target:
          entity_id: input_text.hajukebox_last_voice_source
        data:
          value: "Google Assistant"
      - service: input_text.set_value
        target:
          entity_id: input_text.hajukebox_last_voice_command
        data:
          value: "Set mode to eco"
      - service: input_text.set_value
        target:
          entity_id: input_text.hajukebox_last_voice_response
        data:
          value: "Switching HAJukeBox to eco mode"
      - service: logbook.log
