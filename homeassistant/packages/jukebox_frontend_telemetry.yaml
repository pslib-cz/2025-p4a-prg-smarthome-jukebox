input_number:
  hajukebox_distance_cm_value:
    name: HAJukeBox Distance Cm Value
    min: 0
    max: 1000
    step: 1
    mode: box
    initial: 0

  hajukebox_presence_confidence_value:
    name: HAJukeBox Presence Confidence Value
    min: 0
    max: 100
    step: 1
    mode: slider
    initial: 0

  hajukebox_clap_count_today_value:
    name: HAJukeBox Clap Count Today Value
    min: 0
    max: 999
    step: 1
    mode: box
    initial: 0

  hajukebox_esp32_rssi_value:
    name: HAJukeBox ESP32 RSSI Value
    min: -120
    max: 0
    step: 1
    mode: slider
    initial: -120

  hajukebox_broker_latency_ms_value:
    name: HAJukeBox Broker Latency Ms Value
    min: 0
    max: 2000
    step: 1
    mode: box
    initial: 0

input_text:
  hajukebox_presence_reason_value:
    name: HAJukeBox Presence Reason Value
    max: 120
    initial: "Unavailable"

  hajukebox_uptime_value:
    name: HAJukeBox Uptime Value
    max: 64
    initial: "Unavailable"

input_boolean:
  hajukebox_mqtt_connected_value:
    name: HAJukeBox MQTT Connected Value
    initial: false

input_select:
  hajukebox_mode:
    name: HAJukeBox Mode
    options:
      - Unavailable
      - Idle
      - Focus armed
      - Party
      - Eco
    initial: Unavailable

template:
  - sensor:
      - name: HAJukeBox Distance Cm
        unique_id: hajukebox_distance_cm
        unit_of_measurement: cm
        state: "{{ states('input_number.hajukebox_distance_cm_value') | int(0) }}"

      - name: HAJukeBox Presence Confidence
        unique_id: hajukebox_presence_confidence
        unit_of_measurement: "%"
        state: "{{ states('input_number.hajukebox_presence_confidence_value') | int(0) }}"

      - name: HAJukeBox Presence Reason
        unique_id: hajukebox_presence_reason
        state: "{{ states('input_text.hajukebox_presence_reason_value') }}"

      - name: HAJukeBox Clap Count Today
        unique_id: hajukebox_clap_count_today
        state: "{{ states('input_number.hajukebox_clap_count_today_value') | int(0) }}"

      - name: HAJukeBox ESP32 RSSI
        unique_id: hajukebox_esp32_rssi
        unit_of_measurement: dBm
        state: "{{ states('input_number.hajukebox_esp32_rssi_value') | int(-120) }}"

      - name: HAJukeBox Broker Latency Ms
        unique_id: hajukebox_broker_latency_ms
        unit_of_measurement: ms
        state: "{{ states('input_number.hajukebox_broker_latency_ms_value') | int(0) }}"

      - name: HAJukeBox Uptime
        unique_id: hajukebox_uptime
        state: "{{ states('input_text.hajukebox_uptime_value') }}"

  - binary_sensor:
      - name: HAJukeBox MQTT Connected
        unique_id: hajukebox_mqtt_connected
        state: "{{ is_state('input_boolean.hajukebox_mqtt_connected_value', 'on') }}"
        attributes:
          security: >-
            {% if is_state('input_boolean.hajukebox_mqtt_connected_value', 'on') %}
              Connected
            {% else %}
              Not configured
            {% endif %}

      - name: HAJukeBox Ping Target Connected
        unique_id: hajukebox_ping_target_connected
        device_class: connectivity
        state: "{{ is_state('binary_sensor.192_168_137_47', 'on') }}"
        attributes:
          source_entity_id: binary_sensor.192_168_137_47

script:
  hajukebox_refresh_presence_fusion:
    alias: HAJukeBox Refresh Presence Fusion
    mode: restart
    sequence:
      - variables:
          ping_online: "{{ is_state('binary_sensor.hajukebox_ping_target_connected', 'on') }}"
          mqtt_online: "{{ is_state('input_boolean.hajukebox_mqtt_connected_value', 'on') }}"
          distance_cm: "{{ states('input_number.hajukebox_distance_cm_value') | int(0) }}"
          nearby_distance: "{{ distance_cm > 0 and distance_cm <= 120 }}"
          room_distance: "{{ distance_cm > 120 and distance_cm <= 250 }}"
          presence_confidence: >-
            {% if ping_online and nearby_distance %}
              100
            {% elif ping_online and room_distance %}
              78
            {% elif ping_online %}
              60
            {% elif nearby_distance %}
              90
            {% elif room_distance %}
              45
            {% else %}
              0
            {% endif %}
          presence_reason: >-
            {% if ping_online and nearby_distance %}
              Ping target reachable and distance sensor confirms nearby presence
            {% elif ping_online and room_distance %}
              Ping target reachable and distance sensor sees movement in range
            {% elif ping_online %}
              Ping target reachable
            {% elif nearby_distance %}
              Distance sensor detected nearby presence
            {% elif room_distance %}
              Distance sensor detected movement in range
            {% elif mqtt_online %}
              No nearby distance presence
            {% else %}
              Ping target unreachable and ESP32 offline
            {% endif %}
      - service: input_number.set_value
        target:
          entity_id: input_number.hajukebox_presence_confidence_value
        data:
          value: "{{ presence_confidence | int(0) }}"
      - service: input_text.set_value
        target:
          entity_id: input_text.hajukebox_presence_reason_value
        data:
          value: "{{ presence_reason }}"

automation:
  - id: hajukebox_esp32_distance_telemetry
    alias: HAJukeBox ESP32 Distance Telemetry
    mode: restart
    trigger:
      - platform: mqtt
        topic: jukebox/sensors/distance
    variables:
      distance_cm: "{{ trigger.payload_json.value | int(-1) }}"
      clamped_distance_cm: "{{ [distance_cm, 0] | max }}"
    action:
      - service: input_number.set_value
        target:
          entity_id: input_number.hajukebox_distance_cm_value
        data:
          value: "{{ clamped_distance_cm }}"
      - service: script.hajukebox_refresh_presence_fusion

  - id: hajukebox_esp32_clap_telemetry
    alias: HAJukeBox ESP32 Clap Telemetry
    mode: restart
    trigger:
      - platform: mqtt
        topic: jukebox/sensors/clap
    variables:
      clap_count: "{{ trigger.payload_json.value | int(0) }}"
    action:
      - service: input_number.set_value
        target:
          entity_id: input_number.hajukebox_clap_count_today_value
        data:
          value: "{{ clap_count }}"
      - service: input_text.set_value
        target:
          entity_id: input_text.hajukebox_presence_reason_value
        data:
          value: "Clap detected by ESP32"

  - id: hajukebox_esp32_rssi_telemetry
    alias: HAJukeBox ESP32 RSSI Telemetry
    mode: restart
    trigger:
      - platform: mqtt
        topic: jukebox/device/rssi
    variables:
      rssi_value: "{{ trigger.payload_json.value | int(-120) }}"
      clamped_rssi_value: "{{ [[rssi_value, -120] | max, 0] | min }}"
    action:
      - service: input_number.set_value
        target:
          entity_id: input_number.hajukebox_esp32_rssi_value
        data:
          value: "{{ clamped_rssi_value }}"
      - service: input_boolean.turn_on
        target:
          entity_id: input_boolean.hajukebox_mqtt_connected_value
      - service: script.hajukebox_refresh_presence_fusion

  - id: hajukebox_esp32_uptime_telemetry
    alias: HAJukeBox ESP32 Uptime Telemetry
    mode: restart
    trigger:
      - platform: mqtt
        topic: jukebox/device/uptime
    variables:
      uptime_seconds: "{{ trigger.payload_json.value | int(0) }}"
      uptime_text: >-
        {% set total = uptime_seconds | int(0) %}
        {% set hours = total // 3600 %}
        {% set minutes = (total % 3600) // 60 %}
        {% set seconds = total % 60 %}
        {% if hours > 0 %}
          {{ hours }} h {{ '%02d' | format(minutes) }} m
        {% elif minutes > 0 %}
          {{ minutes }} m {{ '%02d' | format(seconds) }} s
        {% else %}
          {{ seconds }} s
        {% endif %}
    action:
      - service: input_text.set_value
        target:
          entity_id: input_text.hajukebox_uptime_value
        data:
          value: "{{ uptime_text | trim }}"

  - id: hajukebox_esp32_health_status
    alias: HAJukeBox ESP32 Health Status
    mode: restart
    trigger:
      - platform: mqtt
        topic: jukebox/device/health
    variables:
      status_value: "{{ (trigger.payload_json.status | default('offline')) | lower }}"
    action:
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ status_value == 'online' }}"
            sequence:
              - service: input_boolean.turn_on
                target:
                  entity_id: input_boolean.hajukebox_mqtt_connected_value
              - service: script.hajukebox_refresh_presence_fusion
        default:
          - service: input_boolean.turn_off
            target:
              entity_id: input_boolean.hajukebox_mqtt_connected_value
          - service: input_select.select_option
            target:
              entity_id: input_select.hajukebox_mode
            data:
              option: Unavailable
          - service: script.hajukebox_refresh_presence_fusion

  - id: hajukebox_ping_target_presence
    alias: HAJukeBox Ping Target Presence
    mode: restart
    trigger:
      - platform: state
        entity_id: binary_sensor.hajukebox_ping_target_connected
    action:
      - service: script.hajukebox_refresh_presence_fusion

  - id: hajukebox_mode_selection_publish
    alias: HAJukeBox Mode Selection Publish
    mode: restart
    trigger:
      - platform: state
        entity_id: input_select.hajukebox_mode
    variables:
      selected_option: "{{ trigger.to_state.state if trigger.to_state else 'Unavailable' }}"
      normalized_mode: >-
        {% set selected = selected_option | lower %}
        {% if selected == 'focus armed' %}
          focus
        {% elif selected == 'party' %}
          party
        {% elif selected == 'eco' %}
          eco
        {% elif selected == 'idle' %}
          idle
        {% else %}
          unavailable
        {% endif %}
    condition:
      - condition: template
        value_template: "{{ normalized_mode != 'unavailable' }}"
    action:
      - service: mqtt.publish
        data:
          topic: jukebox/media/command
          retain: false
          payload: >-
            {"type":"set_mode","mode":"{{ normalized_mode }}"}

  - id: hajukebox_presence_auto_focus_mode
    alias: HAJukeBox Presence Auto Focus Mode
    mode: single
    trigger:
      - platform: numeric_state
        entity_id: sensor.hajukebox_presence_confidence
        above: 74
        for:
          seconds: 10
    condition:
      - condition: state
        entity_id: input_boolean.hajukebox_mqtt_connected_value
        state: "on"
      - condition: template
        value_template: >-
          {{ states('input_select.hajukebox_mode') in ['Idle', 'Eco', 'Unavailable'] }}
    action:
      - service: script.hajukebox_set_mode
        data:
          mode: focus

  - id: hajukebox_presence_auto_eco_mode
    alias: HAJukeBox Presence Auto Eco Mode
    mode: single
    trigger:
      - platform: numeric_state
        entity_id: sensor.hajukebox_presence_confidence
        below: 1
        for:
          seconds: 30
    condition:
      - condition: state
        entity_id: input_boolean.hajukebox_mqtt_connected_value
        state: "on"
      - condition: template
        value_template: >-
          {{ states('input_select.hajukebox_mode') not in ['Eco', 'Party', 'Unavailable'] }}
    action:
      - service: script.hajukebox_set_mode
        data:
          mode: eco

  - id: hajukebox_esp32_mode_events
    alias: HAJukeBox ESP32 Mode Events
    mode: restart
    trigger:
      - platform: mqtt
        topic: jukebox/system/event
    variables:
      event_name: "{{ trigger.payload_json.event | default('') }}"
    action:
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ event_name == 'mode_focus' }}"
            sequence:
              - service: input_select.select_option
                target:
                  entity_id: input_select.hajukebox_mode
                data:
                  option: Focus armed
          - conditions:
              - condition: template
                value_template: "{{ event_name == 'mode_party' }}"
            sequence:
              - service: input_select.select_option
                target:
                  entity_id: input_select.hajukebox_mode
                data:
                  option: Party
          - conditions:
              - condition: template
                value_template: "{{ event_name == 'mode_eco' }}"
            sequence:
              - service: input_select.select_option
                target:
                  entity_id: input_select.hajukebox_mode
                data:
                  option: Eco
          - conditions:
              - condition: template
                value_template: "{{ event_name == 'mode_idle' }}"
            sequence:
              - service: input_select.select_option
                target:
                  entity_id: input_select.hajukebox_mode
                data:
                  option: Idle
